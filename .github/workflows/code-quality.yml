name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: pip install black isort flake8 mypy

      - name: Check formatting
        run: black --check producer/ consumer/ stream_processor/ storage/ tests/

      - name: Check imports
        run: isort --check-only producer/ consumer/ stream_processor/ storage/ tests/

      - name: Run flake8
        run: flake8 producer/ consumer/ stream_processor/ storage/ tests/ --max-line-length=100 --ignore=E402,W503 --exit-zero

      - name: Run mypy
        run: mypy producer/ consumer/ stream_processor/ storage/ --ignore-missing-imports
