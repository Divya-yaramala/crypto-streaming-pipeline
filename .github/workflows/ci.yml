name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KAFKA_TOPIC_CRYPTO_PRICES: crypto-prices
      KAFKA_CONSUMER_GROUP: crypto-consumer-group
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_BUCKET_NAME: test-bucket
      AWS_REGION: us-east-1
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
      COINGECKO_BASE_URL: https://api.coingecko.com/api/v3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linting
        run: flake8 producer/ consumer/ stream_processor/ storage/ tests/ --max-line-length=100 --ignore=E402,W503 --exit-zero

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results/results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
